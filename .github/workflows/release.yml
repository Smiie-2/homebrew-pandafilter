name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: ccr-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: ccr-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: ccr-linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p ccr

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/ccr ${{ matrix.asset_name }}

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
