name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  integration-test:
    name: Integration tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Linux binary (native, cached)
        run: cargo build --release --target x86_64-unknown-linux-gnu -p ccr

      # Build a thin test image with the pre-compiled binary (~10s, no cargo inside)
      - name: Build test image
        run: |
          docker build \
            --build-arg CCR_BINARY=target/x86_64-unknown-linux-gnu/release/ccr \
            -f docker/Dockerfile.ci \
            -t ccr-test:latest \
            .

      - name: Run integration tests
        run: docker run --rm -e CCR_NO_BERT=1 ccr-test:latest

  build:
    name: Build ${{ matrix.target }}
    needs: integration-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: ccr-macos-arm64
            ort_arch: arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: ccr-macos-x86_64
            ort_arch: x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: ccr-linux-x86_64
            ort_arch: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p ccr

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/ccr ${{ matrix.asset_name }}

      - name: Smoke test binary
        env:
          CCR_NO_BERT: "1"
        run: |
          BIN="./${{ matrix.asset_name }}"

          # x86_64-apple-darwin is cross-compiled on the ARM64 runner.
          # Verify it's a valid Mach-O but skip execution (no Rosetta guarantee in CI).
          if [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]]; then
            file "$BIN" | grep -q "x86_64" && echo "✓ Valid x86_64 Mach-O" || exit 1
            exit 0
          fi

          # ── Runs natively on aarch64-apple-darwin and x86_64-unknown-linux-gnu ──

          # 1. Binary executes and reports correct version
          $BIN --version | grep -qE "^ccr [0-9]+\.[0-9]+\.[0-9]+"

          # 2. Simulate a Claude Code user: create settings.json, run ccr init
          mkdir -p ~/.claude/hooks
          echo '{}' > ~/.claude/settings.json
          $BIN init

          # 3. Hook script exists and is executable
          test -x ~/.claude/hooks/ccr-rewrite.sh

          # 4. ccr verify reports installed (exit 0)
          $BIN verify

          # 5. PreToolUse hook script rewrites a supported command
          REWRITE_IN='{"tool_name":"Bash","tool_input":{"command":"git status"}}'
          REWRITE_OUT=$(echo "$REWRITE_IN" | bash ~/.claude/hooks/ccr-rewrite.sh)
          echo "$REWRITE_OUT" | grep -q "ccr" \
            || { echo "rewrite script did not inject ccr: $REWRITE_OUT"; exit 1; }

          # 6. Filter stdin works
          printf '  Refreshing state...\n  Refreshing state...\n  Refreshing state...\nPlan: 1 to add.\n' \
            | $BIN filter --command terraform \
            | grep -q "collapsed"

          # 7. Run a real git command end-to-end
          git init /tmp/smoke-repo -q
          git -C /tmp/smoke-repo config user.email "ci@ccr.test"
          git -C /tmp/smoke-repo config user.name "CCR CI"
          git -C /tmp/smoke-repo commit --allow-empty -q -m "init"
          $BIN run git -C /tmp/smoke-repo status

          # 8. ccr gain exits 0 (analytics written by step 7)
          $BIN gain

          echo "✓ Smoke test passed (${{ matrix.asset_name }})"

      # macOS only: bundle binary + ORT dylib into a tarball so brew install
      # needs no build dependencies and completes in seconds.
      - name: Bundle binary + ORT dylib (macOS)
        if: matrix.ort_arch != ''
        run: |
          ORT_VERSION="1.20.1"
          ORT_URL="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-osx-${{ matrix.ort_arch }}-${ORT_VERSION}.tgz"

          curl -fsSL "$ORT_URL" -o ort.tgz
          mkdir ort-extracted
          tar -xzf ort.tgz -C ort-extracted

          # Pick the versioned dylib only (skip dSYM debug bundles)
          DYLIB=$(find ort-extracted -name "libonnxruntime.*.dylib" ! -path "*.dSYM*" | head -1)

          mkdir bundle
          cp "${{ matrix.asset_name }}" bundle/ccr
          cp "$DYLIB" bundle/
          tar -czf "${{ matrix.asset_name }}.tar.gz" -C bundle .

          echo "Bundle contents:"
          tar -tzf "${{ matrix.asset_name }}.tar.gz"

      - name: Upload macOS bundle
        if: matrix.ort_arch != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}.tar.gz
          generate_release_notes: true

      - name: Upload Linux binary
        if: matrix.ort_arch == ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true

  update-formula:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.FORMULA_PAT }}
          ref: main

      - name: Compute SHA256s and update formula
        run: |
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/AssafWoo/homebrew-ccr/releases/download/${TAG}"

          # Download both macOS tarballs (release assets may take a moment to appear)
          for ARCH in arm64 x86_64; do
            FILE="/tmp/ccr-macos-${ARCH}.tar.gz"
            for i in $(seq 1 10); do
              curl -fsSL "${BASE}/ccr-macos-${ARCH}.tar.gz" -o "$FILE" && break
              echo "Waiting for ccr-macos-${ARCH}.tar.gz (attempt $i)..."
              sleep 10
            done
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
            if [ "$SIZE" -lt 102400 ]; then
              echo "ERROR: ccr-macos-${ARCH}.tar.gz is only ${SIZE} bytes"
              exit 1
            fi
          done

          ARM64_SHA=$(sha256sum /tmp/ccr-macos-arm64.tar.gz | awk '{print $1}')
          X86_SHA=$(sha256sum /tmp/ccr-macos-x86_64.tar.gz | awk '{print $1}')

          echo "arm64  SHA256: $ARM64_SHA"
          echo "x86_64 SHA256: $X86_SHA"

          # Update explicit version field
          sed -i "s|version \"[0-9.]*\"|version \"${TAG#v}\"|g" Formula/ccr.rb

          # Update download URLs (replace old version tag)
          sed -i "s|releases/download/v[^/]*/ccr-macos-arm64\.tar\.gz|releases/download/${TAG}/ccr-macos-arm64.tar.gz|g" Formula/ccr.rb
          sed -i "s|releases/download/v[^/]*/ccr-macos-x86_64\.tar\.gz|releases/download/${TAG}/ccr-macos-x86_64.tar.gz|g" Formula/ccr.rb

          # Update SHA256s — match the sha256 line immediately after each URL line
          sed -i "/ccr-macos-arm64\.tar\.gz/{n; s/sha256 \"[a-f0-9]*/sha256 \"${ARM64_SHA}/}" Formula/ccr.rb
          sed -i "/ccr-macos-x86_64\.tar\.gz/{n; s/sha256 \"[a-f0-9]*/sha256 \"${X86_SHA}/}" Formula/ccr.rb

          echo "--- Formula after update ---"
          head -18 Formula/ccr.rb

      - name: Commit and push formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ccr.rb
          git diff --cached --quiet && echo "No formula changes" && exit 0
          git commit -m "chore: update formula for ${GITHUB_REF_NAME}"
          git pull --rebase origin main
          git push origin HEAD:main
